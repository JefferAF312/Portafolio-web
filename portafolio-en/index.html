<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=../index.html?lang=en">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to the English portfolio</title>
  <script>
    (function () {
      var hashMap = {
        '#about-me': '#about'
      };
      var hash = hashMap[window.location.hash] || window.location.hash || '';
      window.location.replace('../index.html?lang=en' + hash);
    }());
  </script>
</head>
<body>
  <p>If you are not redirected automatically, open <a href="../index.html?lang=en">the English portfolio</a>.</p>
</body>
</html>
