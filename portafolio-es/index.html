<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=../index.html?lang=es">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirigiendo al portafolio en espanol</title>
  <script>
    (function () {
      var hashMap = {
        '#sobre-mi': '#about',
        '#conocimientos': '#skills',
        '#proyectos': '#projects',
        '#certificados': '#certificates',
        '#contacto': '#contact'
      };
      var hash = hashMap[window.location.hash] || window.location.hash || '';
      window.location.replace('../index.html?lang=es' + hash);
    }());
  </script>
</head>
<body>
  <p>Si no eres redirigido automaticamente, abre <a href="../index.html?lang=es">el portafolio en espanol</a>.</p>
</body>
</html>
